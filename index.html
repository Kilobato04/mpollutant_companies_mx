<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Mapa de Riesgos Ambientales – México</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

  <div id="topbar">
    <h1>🌎 Mapa de Riesgos Ambientales<span>ZMM · CDMX-EDOMEX · AMG</span></h1>
    <div class="controls">
      <input id="search" type="text" placeholder="Buscar empresa, sector…">
      <select id="filterRegion">
        <option value="">Todas las regiones</option>
        <option value="ZMM">ZMM – Monterrey</option>
        <option value="CDMX-EDOMEX">CDMX-EDOMEX</option>
        <option value="AMG">AMG – Guadalajara</option>
      </select>
      <select id="filterMedium">
        <option value="">Todos los medios</option>
        <option value="air">💨 Aire</option>
        <option value="water">💧 Agua</option>
        <option value="noise">🔊 Ruido</option>
      </select>
      <button id="resetBtn">↺ Reset</button>
    </div>
  </div>

  <div id="main">
    <div id="sidebar">
      <div id="stats"></div>
      <div id="list"></div>
    </div>
    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
